openapi: 3.1.0
info:
  title: FxServer Trader API
  version: '1.0'

servers:
  - url: https://localhost:18000
    description: Local Dev
  - url: https://fxapitestv22.mfcloud.net:21424
    description: V22QA

externalDocs:
  description: FAQ docs
  url: /docs/fx-server/general-rest-api-information

paths:
  /addOrder:
    post:
      summary: Add a new order
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOrderRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddOrderResponse'
        '202':
          description: Request accepted for processing
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DelayProcess'
                  - $ref: '#/components/schemas/ManualProcess'
        '400':
          description: Error response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/InvalidPayloadError'
                  - $ref: '#/components/schemas/GenericError'
