components:
  responses:
    RateLimitedResponse:
      description: Rate limit exceeded
      content:
        text/plain:
          schema:
            type: string
          example: Rate limit exceeded
    DuplicateClientOrderIdError:
      description: clientOrderId duplicated, a request with this id was already accepted.
      content:
        application/json:
          schema:
            type: object
            required:
              - msg
            properties:
              msg:
                type: string
                const: DUPLICATE_CLIENT_ORDER_ID

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AddOrderRequest:
      type: object
      required:
        - contractCode
        - price
        - buyOrSell
        - amount
        - close
        - limitOrStop
        - goodTill
      properties:
        clientOrderId:
          type: integer
          minimum: 1
          maximum: 2147483647
          description: >
            Optional client-generated integer for duplicate-request detection.
            Once a request with this id is accepted, any later request reusing the same id
            for the same account within the trade date is rejected with 409.
        buyOrSell:
          type: boolean
          description: "true = buy, false = sell"
        contractCode:
          type: string
          description: Contract code (e.g., "XAUUSD")
        limitOrStop:
          type: boolean
          description: "true = limit order, false = stop order"
        goodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End
        close:
          type: boolean
          description: true = Close, false = Open
        takeProfitGoodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End
        stopLossGoodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End
        price:
          type: number
          format: double
          exclusiveMinimum: 0
        takeProfitPrice:
          type: number
          format: double
          exclusiveMinimum: 0
        stopLossPrice:
          type: number
          format: double
          exclusiveMinimum: 0
        refOrder:
          type: string
          description: reference of close order, default "-1"
        amount:
          type: number
          format: double
          exclusiveMinimum: 0

    AddOrderResponse:
      type: object
      required:
        - orderNo
      properties:
        orderNo:
          type: string

    EditOrderRequest:
      type: object
      required:
        - orderNo
      properties:
        clientOrderId:
          type: integer
          minimum: 1
          maximum: 2147483647
          description: >
            Optional client-generated integer for duplicate-request detection.
            Once a request with this id is accepted, any later request reusing the same id
            for the same account within the trade date is rejected with 409.
        orderNo:
          type: string
        price:
          type: number
          format: double
          exclusiveMinimum: 0
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        goodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End
        takeProfitPrice:
          type: number
          format: double
          exclusiveMinimum: 0
        takeProfitGoodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End
        stopLossPrice:
          type: number
          format: double
          exclusiveMinimum: 0
        stopLossGoodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End
    EditOrderResponse:
      type: object
      required:
        - orderNo
      properties:
        orderNo:
          type: string

    CancelOrderRequest:
      type: object
      required:
        - orderNo
        - comment
      properties:
        orderNo:
          type: string
        comment:
          type: string

    AddDealRequest:
      oneOf:
        - $ref: '#/components/schemas/AddDealMarketRequest'
        - $ref: '#/components/schemas/AddDealQuotedRequest'
      discriminator:
        propertyName: priceMode
        mapping:
          '1': '#/components/schemas/AddDealMarketRequest'
          '2': '#/components/schemas/AddDealQuotedRequest'

    AddDealMarketRequest:
      type: object
      required:
        - priceMode
        - contractCode
        - amount
        - buyOrSell
      properties:
        clientOrderId:
          type: integer
          minimum: 1
          maximum: 2147483647
          description: >
            Optional client-generated integer for duplicate-request detection.
            Once a request with this id is accepted, any later request reusing the same id
            for the same account within the trade date is rejected with 409.
        priceMode:
          type: integer
          const: 1
          description: 1 = market mode (price and priceTag must be omitted; server uses the latest quote)
        contractCode:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        buyOrSell:
          type: boolean
        acceptPips:
          type: integer
          minimum: 0
          default: 0
          description: Slippage tolerance in pips
        takeProfitPrice:
          type: number
          format: double
          exclusiveMinimum: 0
        takeProfitGoodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End
        stopLossPrice:
          type: number
          format: double
          exclusiveMinimum: 0
        stopLossGoodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End

    AddDealQuotedRequest:
      type: object
      required:
        - priceMode
        - contractCode
        - amount
        - buyOrSell
        - price
      properties:
        clientOrderId:
          type: integer
          minimum: 1
          maximum: 2147483647
          description: >
            Optional client-generated integer for duplicate-request detection.
            Once a request with this id is accepted, any later request reusing the same id
            for the same account within the trade date is rejected with 409.
        priceMode:
          type: integer
          const: 2
          description: 2 = quoted mode (price required, priceTag required when server enabled price checking)
        contractCode:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        buyOrSell:
          type: boolean
        acceptPips:
          type: integer
          minimum: 0
          default: 0
          description: Slippage tolerance in pips
        takeProfitPrice:
          type: number
          format: double
          exclusiveMinimum: 0
        takeProfitGoodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End
        stopLossPrice:
          type: number
          format: double
          exclusiveMinimum: 0
        stopLossGoodTill:
          type: integer
          minimum: 0
          maximum: 2
          description: 0 = Friday, 1 = Cancel, 2 = Day End
        price:
          type: number
          format: double
        priceTag:
          type: string
          description: >
            Quote token in the form `${tag};${price}` (e.g. `LLG1775716357987;4762.9`).
            reject with `{ "msg": "710" }` when priceTag is stale or invalid.
            reject with `{ "msg": "2001" }` when priceTag is null and server enabled price checking.
