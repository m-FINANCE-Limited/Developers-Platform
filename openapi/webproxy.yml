openapi: 3.1.0
info:
  description: |
    This is a Web Proxy

    # Authentication

    Some api requires user login as trader.

    <SecurityDefinitions />
  version: 1.0.0
  title: Web Proxy
servers:
  - url: "https://localhost/"
externalDocs:
  description: FAQ docs
  url: /docs/fx-server/general-rest-api-information
components:
  responses:
    RateLimitedResponse:
      description: Rate limit exceeded
      content:
        text/plain:
          schema:
            type: string
          example: Rate limit exceeded
  securitySchemes:
    trader:
      type: http
      scheme: bearer
      bearerFormat: JWT
    guest:
      type: http
      scheme: none
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    lang:
      in: path
      name: lang
      schema:
        type: string
        enum:
          - zh-cn
          - zh-tw
          - en
      required: true
      description: Webpage display language
    RC4_token:
      in: query
      name: token
      schema:
        type: string
      required: true
      description: RC4_token
    beginDate:
      in: query
      name: beginDate
      schema:
        type: string
        format: YYYY-MM-DD.
        example: 2023-07-01
      required: true
      description: Report begin date
    endDate:
      in: query
      name: endDate
      schema:
        type: string
        format: YYYY-MM-DD.
        example: 2023-12-31
      required: true
      description: Report end date
    currency:
      in: query
      name: currency
      description: optional convertion for all amount. default to settle currency
      schema:
        type: string
        enum:
          - display
          - settle
    token:
      in: query
      name: token
      schema:
        type: string
      required: true
      description: authentication token of fts user
  schemas:
    contractSummary:
      type: object
      properties:
        market:
          type: string
          description: Contract code
        enabled:
          type: boolean
        contractSize:
          type: number
          description: AKA lot size
        decimalPlace:
          type: number
        productName:
          type: string
        nameEng:
          type: string
          description: Contract name in English
        nameTC:
          type: string
          description: Contract name in Traditional Chinese
        nameSC:
          type: string
          description: Contract name in Simplified Chinese
        orderPips:
          type: number
          description: Order Pips
        baseCurr:
          type: string
          description: Base currency
        counterCurr:
          type: string
          description: Counter currency
        minTradeLot:
          type: number
          description: Min trade lot
        minLotIncrementUnit:
          type: number
          description: Min lot increment unit
        netType:
          type: number
          description: Net Type. Method for margin calculation
        bidInterest:
          type: number
          description: Interest rate on bid
        askInterest:
          type: number
          description: Interest rate on ask
        interestMethod:
          type: number
          description: Interest method
        storage:
          type: number
          description: Storage fee for each lot
        newPosMargin:
          type: number
          description: New position margin requirement
        category:
          type: integer
          description: >
            Category / Currency Type:
            * `0` - Forex
            * `1` - Bullion
            * `2` - Commodity
            * `4` - CFDUS
            * `5` - CFDHK
            * `6` - Crypto
          enum: [ 0, 1, 2, 4, 5, 6 ]
        askAdjust:
          type: number
          description: Adjust of Ask Price
        bidAdjust:
          type: number
          description: Adjust of Bid Price
      required:
        - market
        - enabled
        - contractSize
        - decimalPlace
        - productName
        - nameEng
        - nameTC
        - nameSC
        - orderPips
        - baseCurr
        - counterCurr
        - minTradeLot
        - minLotIncrementUnit
        - netType
        - bidInterest
        - askInterest
        - interestMethod
        - storage
        - newPosMargin
        - category
        - askAdjust
        - bidAdjust
    ContractSettingResponse:
      type: object
      properties:
        market:
          type: string
          description: Contract code
        enabled:
          type: boolean
        contractSize:
          type: number
          description: AKA lot size
        decimalPlace:
          type: number
        productName:
          type: string
        nameEng:
          type: string
          description: Contract name in English
        nameTC:
          type: string
          description: Contract name in Traditional Chinese
        nameSC:
          type: string
          description: Contract name in Simplified Chinese
        orderPips:
          type: number
          description: Order Pips
        baseCurr:
          type: string
          description: Base currency
        counterCurr:
          type: string
          description: Counter currency
        netType:
          type: number
          description: Net Type. Method for margin calculation
        bidInterest:
          type: number
          description: Interest rate on bid
        askInterest:
          type: number
          description: Interest rate on ask
        interestMethod:
          type: number
          description: Interest method
        storage:
          type: number
          description: Storage fee for each lot
        newPosMargin:
          type: number
          description: New position margin requirement
        category:
          type: integer
          description: >
            Category / Currency Type:
            * `0` - Forex
            * `1` - Bullion
            * `2` - Commodity
            * `4` - CFDUS
            * `5` - CFDHK
            * `6` - Crypto
          enum: [ 0, 1, 2, 4, 5, 6 ]
        tradable:
          type: boolean
          description: Customer Group Contract Enable trade setting
        maxLotPerTrade:
          type: number
          description: Max Lot PerTrade
        minTradeLot:
          type: number
          description: Min trade lot
        minLotIncrementUnit:
          type: number
          description: Min lot increment unit
        maxOrderLot:
          type: number
          description: Max Order Lot
        tradeLimitLot:
          type: number
          description: Trade Limit Lot
        maxNetOpenPositionLot:
          type: number
          description: Max Net Position Lot
      required:
        - market
        - enabled
        - contractSize
        - decimalPlace
        - productName
        - nameEng
        - nameTC
        - nameSC
        - orderPips
        - baseCurr
        - counterCurr
        - minTradeLot
        - minLotIncrementUnit
        - netType
        - bidInterest
        - askInterest
        - interestMethod
        - storage
        - newPosMargin
        - category
        - tradable
        - maxLotPerTrade
        - maxOrderLot
        - tradeLimitLot
        - maxNetOpenPositionLot
    sessionChecks:
      type: object
      properties:
        user:
          type: object
          description: checks the user and updates the session on success
          properties:
            userId:
              type: string
              description: User ID
            loginName:
              type: string
              description: Email
        password:
          type: object
          description: Checks the password and updates the session on success. Requires that the user is already checked, either in the previous or the same request.
          properties:
            password:
              type: string
              description: Password
        otpSms:
          type: object
          description: Checks the One-Time Password sent over SMS and updates the session on success. Requires that the user is already checked, either in the previous or the same request.
          properties:
            code:
              type: string
        otpEmail:
          type: object
          description: Checks the One-Time Password sent over Email and updates the session on success. Requires that the user is already checked, either in the previous or the same request.
          properties:
            code:
              type: string
    TokenRequest:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          type: string
          maxLength: 50
        permissions:
          type: array
          items:
            type: string
            enum: [read, trade, withdraw]
          description: List of permissions granted to this token
          example: ["read", "trade", "withdraw"]
        expirationDate:
          type: string
          format: date
          nullable: true
          description: Optional date when the token should expire
          example: "2025-05-31"
    TokenMetaData:
      type: object
      properties:
        name:
          type: string
          description: Token name
          example: "ApiKey"
        permissions:
          type: array
          items:
            type: string
            enum: [read, trade, withdraw]
          example: ["read", "trade"]
        active:
          type: boolean
          description: Whether the token is active
          example: true
        expirationDate:
          type: string
          format: date
          nullable: true
          description: Optional date when the token expires
          example: "2026-12-31"
        creationDate:
          type: string
          format: date
          description: Timestamp when the token was created
          example: "2025-04-15 00:00:00 +08:00"
        lastUsedTime:
          type: string
          format: date-time
          description: Timestamp of the last usage of this token
          example: "2025-04-15 11:00:48 +08:00"
        tokenId:
          type: string
          description: Unique identifier for the token
          example: "tk_7f4b8e2"
        userName:
          type: string
          description: Username for the token
    LastConsecutiveObject:
      type: object
      discriminator:
        propertyName: exist
        mapping:
          lastConsecutiveTradeExist: '#/components/schemas/LastConsecutiveExistObject'
          lastConsecutiveTradeNotExist: '#/components/schemas/LastConsecutiveNotExistObject'
      oneOf:
        - $ref: '#/components/schemas/LastConsecutiveExistObject'
        - $ref: '#/components/schemas/LastConsecutiveNotExistObject'
    LastConsecutiveExistObject:
      type: object
      properties:
        exist:
          type: boolean
          description: whether this traders has last trade record
        account:
          type: string
          description: account name
          example: peter
        pnl:
          type: number
          description: consecutive pnl in last trade. Positive means profit, negative is loss.
          example: 1000
        tradeCount:
          type: number
          description: consecutive trade count in last trade. Positive means win, negative is loss.
          example: 3
    LastConsecutiveNotExistObject:
      type: object
      properties:
        exist:
          type: boolean
          example: false
          description: whether this traders has last trade record
    PositionSummary:
      type: object
      required:
        - ref
        - contract
        - buySell
        - price
        - amount
        - accPL
      properties:
        ref:
          type: integer
          description: Position reference number
        contract:
          type: string
          description: Contract code
        buySell:
          type: boolean
          description: buy(true), sell(false)
        price:
          type: number
          format: double
          description: Position price
        amount:
          type: number
          format: double
          description: Position amount
        accPL:
          type: number
          format: double
          description: Accumulated profit/loss
        tranDate:
          type: string
          format: date-time
          description: Position TranDate
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
    OrderSummary:
      type: object
      required:
        - ref
        - contract
        - buySell
        - requestPrice
        - amount
      properties:
        ref:
          type: integer
          description: Order reference number
        contract:
          type: string
          description: Contract code
        buySell:
          type: boolean
          description: "true = buy, false = sell"
        requestPrice:
          type: number
          format: double
          description: Requested price
        amount:
          type: number
          format: double
          description: Order amount
        tranDate:
          type: string
          format: date-time
          description: Order TranDate
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
    PositionTodayResponse:
      type: object
      properties:
        positions:
          type: array
          items:
            $ref: '#/components/schemas/PositionSummary'
          description: positions
    OrderTodayResponse:
      type: object
      properties:
        workingOrders:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
          description: Working orders
        executedOrders:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
          description: Executed orders
        cancelledOrders:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
          description: Cancelled orders

    WorkingOrderResponse:
      type: object
      required:
        - ref
        - tranDate
        - contract
        - buyOrSell
        - requestPrice
        - amount
        - ae
        - execDate
        - createDate
        - limitOrStop
      properties:
        # --- Common Fields ---
        ref:
          type: integer
          description: "Order Reference ID"
        tranDate:
          type: string
          format: date-time
          description: "Transaction Date"
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
        contract:
          type: string
        buyOrSell:
          type: boolean
          description: "true = buy, false = sell"
        requestPrice: # rate
          type: number
          format: double
        amount:
          type: number
          format: double
        ae:
          type: string
          description: "Account Executive (InputAE)"
        execDate:
          type: string
          format: date-time
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
        createDate:
          type: string
          format: date-time
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
        editAE:
          type: string
        editDate:
          type: string
          format: date-time
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
        good:
          type: integer
          description: "0 = Friday, 1 = Cancel, 2 = Day End"
        goodTill:
          type: string
          format: date-time
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
        limitOrStop: # stopOrder
          type: boolean
          description: "true = limit order, false = stop order"
        rateDecPt:
          type: integer
        liqMethod:
          type: integer
        ocoRef:
          type: integer
        liqRate:
          type: number
          format: double
        contractSize:
          type: number
          format: double
        trailingStopSize:
          type: integer
        comment:
          type: string
        liqList:
          type: string
        takeProfitPrice:
          type: number
          format: double
        takeProfitGood:
          type: integer
          description: "0 = Friday, 1 = Cancel, 2 = Day End"
        takeProfitGoodTill:
          type: string
          format: date-time
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
        stopLossPrice:
          type: number
          format: double
        stopLossGood:
          type: integer
          description: "0 = Friday, 1 = Cancel, 2 = Day End"
        stopLossGoodTill:
          type: string
          format: date-time
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
        # Working Order Only
        refRate:
          type: number
          format: double
          description: "Reference Rate (Working Order only)"
        createSysDate:
          type: string
          description: "System Date string (Working Order only)"

