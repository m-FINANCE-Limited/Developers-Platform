  /api/news/:
    summary: List news
    get:
      summary: Get news list
      tags:
        - News
      description: "List news heading and brief description"
      operationId: "getNewsList"
      security:
        - trader: []
      parameters:
        - name: lang
          in: query
          description: language of news to retrieve
          required: false
          schema:
            type: string
            description: >
              language of news to retrieve
              Dictionary:
                * -zh-tw: Traditional Chinese
                * -zh-cn: Simplified Chinese
                * -en: English
            enum:
              - 'zh-tw'
              - 'zh-cn'
              - 'en'
            default: 'en'
        - name: reportGroup
          in: query
          description: Name of the reportGroup
          required: false
          schema:
            type: string
        - name: start
          in: query
          description: Starting index of the results, if not provided return latest 50 result
          required: false
          schema:
            type: integer
            minimum: 1
        - name: size
          in: query
          description: Number of results to return, if not provided return latest 50 result
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        200:
          description: A list of news header and briefings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    newsId:
                      type: string
                      description: unique news id
                      example: 1
                    header:
                      type: string
                      description: news header
                      example: "再往上衝！看漲金價的三大理由"
                    date:
                      type: string
                      description: news publish or latest update date, in iso date format
                      example: "2023-08-24T08:23:32Z"
                    content:
                      type: string
