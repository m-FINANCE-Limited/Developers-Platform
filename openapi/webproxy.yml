          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
        contract:
          type: string
        buyOrSell:
          type: boolean
          description: "true = buy, false = sell"
        requestPrice: #rate
          type: number
          format: double
        amount:
          type: number
          format: double
        ae:
          type: string
          description: "Account Executive (EditAE)"
        execDate:
          type: string
          format: date-time
          x-field-extra-annotation: |-
            @com.fasterxml.jackson.annotation.JsonFormat(pattern = "yyyy-MM-dd'T'HH:mm:ssXXX")
          example: 2026-04-28T00:00:00+08:00
        createDate:
          type: string
          format: date-time
          x-field-extra-annotation: |-
